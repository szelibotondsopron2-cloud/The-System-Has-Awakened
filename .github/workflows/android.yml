name: Build Android APK Debug Log

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build and save log
        run: |
          ls -la > build-log.txt
          echo "---- FILES ----" >> build-log.txt
          find . -maxdepth 4 -type f | sort >> build-log.txt
          echo "---- BUILD ----" >> build-log.txt
          gradle assembleDebug --stacktrace --info >> build-log.txt 2>&1 || true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt

      - name: Upload APK if built
        uses: actions/upload-artifact@v4
        with:
          name: Calis10x-debug-apk
          path: app/build/outputs/apk/debug/*.apk
